name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check tag matches workspace version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WS_VERSION=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c "import json,sys; m=json.load(sys.stdin); \
              v=next(p['version'] for p in m['packages'] if p['name']=='jsonapi_core'); print(v)")
          echo "tag=$TAG workspace=$WS_VERSION"
          if [ "$TAG" != "$WS_VERSION" ]; then
            echo "::error::Tag $TAG does not match jsonapi_core version $WS_VERSION"
            exit 1
          fi
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo test -p jsonapi_core --no-default-features
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies for known advisories
        run: cargo audit --deny warnings
      - name: SemVer compliance (jsonapi_core)
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
      - name: Build docs (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --all-features
      - name: Verify jsonapi_core_derive packages cleanly
        run: cargo package -p jsonapi_core_derive
      - name: Verify jsonapi_core packaging file list
        run: cargo package --list -p jsonapi_core

  msrv:
    name: msrv (1.94.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: "1.94.1"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: msrv
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features

  publish-crates:
    name: publish to crates.io
    needs: [verify, msrv]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Publish jsonapi_core_derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p jsonapi_core_derive

      - name: Wait for jsonapi_core_derive to appear on the index
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c "import json,sys; m=json.load(sys.stdin); \
              v=next(p['version'] for p in m['packages'] if p['name']=='jsonapi_core_derive'); print(v)")
          UA="jsonapi_core-release-workflow (https://github.com/rankitbishnoi/jsonapi_core)"
          for i in $(seq 1 30); do
            if curl -fsSL -H "User-Agent: $UA" \
                "https://crates.io/api/v1/crates/jsonapi_core_derive" \
                | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null; then
              echo "jsonapi_core_derive $VERSION is available"
              exit 0
            fi
            echo "waiting for jsonapi_core_derive $VERSION ($i/30)..."
            sleep 10
          done
          echo "::error::Timed out waiting for jsonapi_core_derive on the registry"
          exit 1

      - name: Publish jsonapi_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p jsonapi_core

      - name: Attest crate provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: 'target/package/*.crate'

  github-release:
    name: GitHub release
    needs: publish-crates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Extract release notes from CHANGELOG
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG_VERSION" '
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; print; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section [$TAG_VERSION]; falling back to auto-generated notes only. Did you rename [Unreleased] → [$TAG_VERSION] before tagging?"
          else
            echo "::notice::Curated release notes extracted from CHANGELOG.md [$TAG_VERSION]"
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release-notes.md
          generate_release_notes: true
          append_body: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
