name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Check tag matches workspace version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          WS_VERSION=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c "import json,sys; m=json.load(sys.stdin); \
              v=next(p['version'] for p in m['packages'] if p['name']=='jsonapi_core'); print(v)")
          echo "tag=$TAG workspace=$WS_VERSION"
          if [ "$TAG" != "$WS_VERSION" ]; then
            echo "::error::Tag $TAG does not match jsonapi_core version $WS_VERSION"
            exit 1
          fi
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: cargo test -p jsonapi_core --no-default-features --locked
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies for known advisories
        run: cargo audit --deny warnings
      - name: SemVer compliance (jsonapi_core)
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2
      - name: Build docs (deny warnings)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --all-features --locked
      - name: Verify jsonapi_core_derive packages cleanly
        run: cargo package -p jsonapi_core_derive --locked
      - name: Verify jsonapi_core packaging file list
        run: cargo package --list -p jsonapi_core

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: msrv
      - run: cargo build --workspace --all-features --locked
      - run: cargo test --workspace --all-features --locked

  publish-crates:
    name: publish to crates.io
    needs: [verify, msrv]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Publish jsonapi_core_derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p jsonapi_core_derive --locked

      - name: Wait for jsonapi_core_derive to appear on the index
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps \
            | python3 -c "import json,sys; m=json.load(sys.stdin); \
              v=next(p['version'] for p in m['packages'] if p['name']=='jsonapi_core_derive'); print(v)")
          UA="jsonapi_core-release-workflow (https://github.com/rankitbishnoi/jsonapi_core)"
          for i in $(seq 1 30); do
            if curl -fsSL -H "User-Agent: $UA" \
                "https://crates.io/api/v1/crates/jsonapi_core_derive" \
                | jq -e --arg v "$VERSION" '.versions[] | select(.num == $v)' >/dev/null; then
              echo "jsonapi_core_derive $VERSION is available"
              exit 0
            fi
            echo "waiting for jsonapi_core_derive $VERSION ($i/30)..."
            sleep 10
          done
          echo "::error::Timed out waiting for jsonapi_core_derive on the registry"
          exit 1

      - name: Publish jsonapi_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p jsonapi_core --locked

      - name: Attest crate provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: 'target/package/*.crate'

  github-release:
    name: GitHub release
    needs: publish-crates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Extract release notes from CHANGELOG
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$TAG_VERSION" '
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; print; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section [$TAG_VERSION]; falling back to auto-generated notes only. Did you rename [Unreleased] → [$TAG_VERSION] before tagging?"
          else
            echo "::notice::Curated release notes extracted from CHANGELOG.md [$TAG_VERSION]"
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          append_body: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
